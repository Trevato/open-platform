apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: minio
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.min.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: minio
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  install:
    createNamespace: true
  values:
    mode: standalone
    replicas: 1
    existingSecret: minio-credentials
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        memory: 256Mi
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - s3.dev.test
    consoleIngress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - minio.dev.test
