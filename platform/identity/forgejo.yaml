apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 12h
  url: oci://code.forgejo.org/forgejo-helm/forgejo
  ref:
    semver: "16.x"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 15m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: forgejo
    namespace: flux-system
  install:
    createNamespace: true
  values:
    gitea:
      admin:
        existingSecret: forgejo-admin-credentials
        email: "trevato@trevato.dev"
      additionalConfigFromEnvs:
        - name: FORGEJO__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db-config
              key: password
      config:
        server:
          DOMAIN: forgejo.product-garden.com
          ROOT_URL: https://forgejo.product-garden.com
          SSH_DOMAIN: forgejo.product-garden.com
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222
          LFS_START_SERVER: true
        database:
          DB_TYPE: postgres
          HOST: postgres-rw.postgres.svc.cluster.local:5432
          NAME: forgejo
          USER: forgejo
          SSL_MODE: disable
        packages:
          ENABLED: true
        service:
          DISABLE_REGISTRATION: false
          DEFAULT_ALLOW_CREATE_ORGANIZATION: true
        repository:
          DEFAULT_PRIVATE: true
        oauth2:
          ENABLE: true
        openid:
          ENABLE_OPENID_SIGNIN: true
        webhook:
          ALLOWED_HOST_LIST: "*.product-garden.com"
          SKIP_TLS_VERIFY: true
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: forgejo.product-garden.com
          paths:
            - path: /
              pathType: Prefix
    persistence:
      enabled: true
      size: 10Gi
    deployment:
      nodeSelector:
        kubernetes.io/hostname: otavert-vxrail
    postgresql:
      enabled: false
    redis-cluster:
      enabled: false
    redis:
      enabled: false
