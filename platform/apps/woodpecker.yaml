apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: woodpecker
  namespace: flux-system
spec:
  interval: 24h
  url: https://woodpecker-ci.org/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
  namespace: woodpecker
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: woodpecker
      sourceRef:
        kind: HelmRepository
        name: woodpecker
        namespace: flux-system
  install:
    createNamespace: true
  values:
    server:
      enabled: true
      env:
        WOODPECKER_FORGEJO: "true"
        WOODPECKER_FORGEJO_URL: "https://forgejo.dev.test"
        WOODPECKER_FORGEJO_SKIP_VERIFY: "true"
        WOODPECKER_CLONE_INSECURE_SKIP_VERIFY: "true"
        WOODPECKER_HOST: "http://ci.dev.test"
        WOODPECKER_ADMIN: "trevato"
        WOODPECKER_OPEN: "true"
      extraSecretNamesForEnvFrom:
        - woodpecker-secrets
      persistentVolume:
        enabled: true
        size: 10Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: ci.dev.test
            paths:
              - path: /
                pathType: Prefix
    agent:
      enabled: true
      replicaCount: 1
      env:
        WOODPECKER_BACKEND: kubernetes
        WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
        WOODPECKER_BACKEND_K8S_VOLUME_SIZE: "5G"
        WOODPECKER_MAX_WORKFLOWS: "4"
      extraSecretNamesForEnvFrom:
        - woodpecker-secrets
