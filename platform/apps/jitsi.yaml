apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jitsi
  namespace: flux-system
spec:
  interval: 12h
  url: https://jitsi-contrib.github.io/jitsi-helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jitsi
  namespace: jitsi
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: jitsi-meet
      version: "2.13.1"
      sourceRef:
        kind: HelmRepository
        name: jitsi
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
