apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: woodpecker-deployer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update", "create"]
  - apiGroups: [""]
    resources: ["services", "secrets", "pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: woodpecker-pipeline
  namespace: woodpecker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: woodpecker-deployer
subjects:
  - kind: ServiceAccount
    name: woodpecker-agent
    namespace: woodpecker
roleRef:
  kind: ClusterRole
  name: woodpecker-deployer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: woodpecker-pipeline-deployer
subjects:
  - kind: ServiceAccount
    name: woodpecker-pipeline
    namespace: woodpecker
roleRef:
  kind: ClusterRole
  name: woodpecker-deployer
  apiGroup: rbac.authorization.k8s.io
