apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  install:
    createNamespace: true
  values:
    config:
      oidc:
        secret:
          create: false
        externalSecret:
          enabled: true
          name: "oidc"
        issuerURL: https://forgejo.product-garden.com
        scopes: "openid,profile,email,groups"
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: headlamp.product-garden.com
          paths:
            - path: /
              type: ImplementationSpecific
    env:
      - name: HEADLAMP_CONFIG_OIDC_SKIP_TLS_VERIFY
        value: "true"
