name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/open-platform/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint chart
        run: |
          helm lint charts/open-platform \
            --set domain=lint.example.com

      - name: Package and push
        run: |
          VERSION=$(grep '^version:' charts/open-platform/Chart.yaml | awk '{print $2}')
          helm package charts/open-platform
          helm push open-platform-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}
          echo "Published: oci://ghcr.io/${{ github.repository_owner }}/open-platform:${VERSION}"
