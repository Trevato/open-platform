clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      skip_verify: true

when:
  - event: [push, manual]
    branch: main

steps:
  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: forgejo.dev.test
      repo: ${CI_REPO_OWNER}/${CI_REPO_NAME}
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      skip_tls_verify: true
      username:
        from_secret: registry_username
      password:
        from_secret: registry_token

  - name: provision
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - kubectl create namespace $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl label namespace $APP_NS \
          platform.dev.test/managed=true \
          platform.dev.test/org=${CI_REPO_OWNER} \
          platform.dev.test/repo=${CI_REPO_NAME} \
          platform.dev.test/tier=workload \
          platform.dev.test/environment=production \
          --overwrite
      - |
        kubectl get secret minio-credentials -n minio -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"minio"/"namespace": "'$APP_NS'"/' | \
          kubectl apply -f -
      - |
        kubectl get configmap platform-ca -n kube-system -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"kube-system"/"namespace": "'$APP_NS'"/' | \
          kubectl apply -f -
      - |
        kubectl create secret docker-registry forgejo-registry \
          --docker-server=forgejo.dev.test \
          --docker-username=$${REGISTRY_USER} \
          --docker-password=$${REGISTRY_TOKEN} \
          -n $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl exec -n postgres postgres-1 -- psql -U postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1 || {
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE DATABASE $DB_NAME"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE USER $DB_NAME WITH PASSWORD '$DB_NAME'" || true
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_NAME"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "ALTER DATABASE $DB_NAME OWNER TO $DB_NAME"
        }
      - |
        kubectl run minio-provision-$${CI_COMMIT_SHA:0:8} --rm -i --restart=Never \
          --image=minio/mc:latest -n minio \
          --overrides='{"spec":{"containers":[{"name":"minio-provision-'$${CI_COMMIT_SHA:0:8}'","image":"minio/mc:latest","command":["sh","-c"],"args":["mc alias set minio http://minio.minio.svc:9000 $(cat /minio/rootUser) $(cat /minio/rootPassword) && mc mb --ignore-existing minio/'$APP_NS' && mc anonymous set download minio/'$APP_NS'"],"volumeMounts":[{"name":"creds","mountPath":"/minio"}]}],"volumes":[{"name":"creds","secret":{"secretName":"minio-credentials"}}]}}'
    environment:
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_TOKEN:
        from_secret: registry_token

  - name: schema
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - |
        if [ -f schema.sql ]; then
          kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $DB_NAME < schema.sql
          kubectl exec -n postgres postgres-1 -- psql -U postgres -d $DB_NAME -c \
            "GRANT ALL ON ALL TABLES IN SCHEMA public TO $DB_NAME; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO $DB_NAME;"
        fi

  - name: seed
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - |
        for f in seed/sql/*.sql; do
          [ -f "$f" ] && kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $DB_NAME < "$f"
        done

  - name: deploy
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - sed -i "s/APP_NAMESPACE/$APP_NS/g; s/DB_NAME/$DB_NAME/g; s/PROJECT_NAME/${CI_REPO_NAME}/g; s/ORG_NAME/${CI_REPO_OWNER}/g" k8s/*.yaml
      - sed -i "s/:latest/:${CI_COMMIT_SHA:0:8}/g" k8s/deployment.yaml
      - kubectl apply -f k8s/
      - kubectl rollout status deployment/${CI_REPO_NAME} -n $APP_NS --timeout=120s
