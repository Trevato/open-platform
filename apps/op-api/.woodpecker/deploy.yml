when:
  - event: [push, manual]
    branch: main

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      skip_verify: true

steps:
  - name: typecheck-and-test
    image: oven/bun:1-alpine
    commands:
      - bun install
      - bun run typecheck
      - bun test

  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      repo: ${CI_REPO_OWNER}/${CI_REPO_NAME}
      registry:
        from_secret: registry_host
      tags:
        - ${CI_COMMIT_SHA:0:8}
        - latest
      username:
        from_secret: registry_username
      password:
        from_secret: registry_token
      skip_tls_verify: true
      cache: true

  - name: provision
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-$CI_REPO_OWNER-$CI_REPO_NAME"
      - DB_NAME="op_system_console"
      - DB_USER="op_system_console"
      - kubectl create namespace $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - kubectl label namespace $APP_NS open-platform.sh/managed=true open-platform.sh/org=$CI_REPO_OWNER open-platform.sh/repo=$CI_REPO_NAME open-platform.sh/tier=workload open-platform.sh/environment=production --overwrite
      - |
        kubectl get configmap platform-ca -n kube-system -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"kube-system"/"namespace": "'$APP_NS'"/' | \
          kubectl apply -f - || true
      - |
        kubectl create secret docker-registry forgejo-registry \
          --docker-server=$REGISTRY_HOST \
          --docker-username=$${REGISTRY_USER} \
          --docker-password=$${REGISTRY_TOKEN} \
          -n $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl exec -n postgres postgres-1 -- psql -U postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1 || {
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE DATABASE $DB_NAME"
        }
      - |
        kubectl exec -n postgres postgres-1 -- psql -U postgres -tc \
          "SELECT 1 FROM pg_roles WHERE rolname = '$DB_USER'" | grep -q 1 || {
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE USER $DB_USER WITH PASSWORD '$DB_USER'"
        }
      - kubectl exec -n postgres postgres-1 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_USER" || true
      - kubectl exec -n postgres postgres-1 -- psql -U postgres -d $DB_NAME -c "GRANT ALL ON SCHEMA public TO $DB_USER" || true
      - kubectl exec -n postgres postgres-1 -- psql -U postgres -d $DB_NAME -c "ALTER TABLE customers ALTER COLUMN user_id DROP NOT NULL" 2>/dev/null || true
      - |
        kubectl create secret generic console-db \
          --from-literal=database-url="postgresql://$DB_USER:$DB_USER@postgres-rw.postgres.svc.cluster.local:5432/$DB_NAME" \
          -n $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl get secret forgejo-admin-credentials -n forgejo -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"forgejo"/"namespace": "'$APP_NS'"/' | \
          kubectl apply -f - || true
      - WP_TOKEN=$(kubectl get secret woodpecker-api-token -n woodpecker -o jsonpath='{.data.token}' | base64 -d 2>/dev/null || echo "")
      - |
        if [ -n "$WP_TOKEN" ]; then
          kubectl create secret generic op-api-secrets -n $APP_NS \
            --from-literal=woodpecker-admin-token="$WP_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
        fi
    environment:
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_TOKEN:
        from_secret: registry_token
      REGISTRY_HOST:
        from_secret: registry_host

  - name: deploy
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-$CI_REPO_OWNER-$CI_REPO_NAME"
      - SP=$(echo "$SERVICE_PREFIX" | tr -d ' ')
      - sed -i "s|__SERVICE_PREFIX__|$SP|g; s|__PLATFORM_DOMAIN__|$PLATFORM_DOMAIN|g; s|APP_NAMESPACE|$APP_NS|g; s|REGISTRY_HOST|$REGISTRY_HOST|g; s|ORG_NAME|$CI_REPO_OWNER|g; s|PROJECT_NAME|$CI_REPO_NAME|g" k8s/*.yaml
      - sed -i "s/:latest/:${CI_COMMIT_SHA:0:8}/g" k8s/deployment.yaml
      - kubectl apply -f k8s/rbac.yaml || echo "RBAC already exists or escalation not permitted — continuing"
      - kubectl apply -f k8s/deployment.yaml -f k8s/service.yaml -f k8s/ingress.yaml
      - kubectl rollout status deployment/op-api -n $APP_NS --timeout=120s
    environment:
      SERVICE_PREFIX:
        from_secret: service_prefix
      REGISTRY_HOST:
        from_secret: registry_host
      PLATFORM_DOMAIN:
        from_secret: platform_domain

  # Ensure main branch is protected (requires PRs for changes).
  # The forgejo_admin_token org secret is created by setup-woodpecker-repos.sh during bootstrap.
  - name: protect-branch
    image: alpine/curl
    failure: ignore
    commands:
      - SP=$(echo "$SERVICE_PREFIX" | tr -d ' ')
      - FORGEJO_URL="https://$${SP}forgejo.$PLATFORM_DOMAIN"
      - REPO_API="$FORGEJO_URL/api/v1/repos/$CI_REPO_OWNER/$CI_REPO_NAME"
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token $FORGEJO_ADMIN_TOKEN" \
          "$REPO_API/branch_protections/main")
      - |
        if [ "$STATUS" = "404" ]; then
          echo "Setting branch protection on main..."
          curl -sf -X POST \
            -H "Authorization: token $FORGEJO_ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            "$REPO_API/branch_protections" \
            -d '{"branch_name":"main","enable_push":false,"enable_force_push":false}'
          echo "Branch protection enabled."
        else
          echo "Branch protection already exists, skipping."
        fi
    environment:
      SERVICE_PREFIX:
        from_secret: service_prefix
      PLATFORM_DOMAIN:
        from_secret: platform_domain
      FORGEJO_ADMIN_TOKEN:
        from_secret: forgejo_admin_token
