apiVersion: v1
kind: ServiceAccount
metadata:
  name: op-api
  namespace: APP_NAMESPACE
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: op-api
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: op-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: op-api
subjects:
  - kind: ServiceAccount
    name: op-api
    namespace: APP_NAMESPACE
