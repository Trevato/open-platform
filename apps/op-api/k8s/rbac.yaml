apiVersion: v1
kind: ServiceAccount
metadata:
  name: op-api
  namespace: APP_NAMESPACE
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: op-api
rules:
  # Platform status reads
  - apiGroups: [""]
    resources:
      [
        "services",
        "configmaps",
        "secrets",
        "persistentvolumeclaims",
        "serviceaccounts",
      ]
    verbs: ["get", "list", "watch"]
  # Pods: read + create/delete for ephemeral cleanup pods (DB drop, S3 delete)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Namespaces: read + create/patch/delete for app lifecycle
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # Deployments: read + patch for stop/start (scale replicas)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  # Nodes: read + patch (labels, cordon) + delete for node management
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: op-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: op-api
subjects:
  - kind: ServiceAccount
    name: op-api
    namespace: APP_NAMESPACE
