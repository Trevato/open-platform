apiVersion: apps/v1
kind: Deployment
metadata:
  name: op-api
  namespace: APP_NAMESPACE
  labels:
    app: op-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: op-api
  template:
    metadata:
      labels:
        app: op-api
    spec:
      serviceAccountName: op-api
      imagePullSecrets:
        - name: forgejo-registry
      initContainers:
        - name: merge-ca
          image: oven/bun:1-alpine
          command: ["sh", "-c"]
          args:
            - |
              cat /etc/ssl/custom/ca.crt /var/run/secrets/kubernetes.io/serviceaccount/ca.crt > /merged-ca/ca-bundle.crt 2>/dev/null || \
              cp /var/run/secrets/kubernetes.io/serviceaccount/ca.crt /merged-ca/ca-bundle.crt
          volumeMounts:
            - name: platform-ca
              mountPath: /etc/ssl/custom
              readOnly: true
            - name: merged-ca
              mountPath: /merged-ca
      containers:
        - name: app
          image: REGISTRY_HOST/ORG_NAME/PROJECT_NAME:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: FORGEJO_INTERNAL_URL
              value: "http://forgejo-http.forgejo.svc.cluster.local:3000"
            - name: FORGEJO_URL
              value: "https://__SERVICE_PREFIX__forgejo.__PLATFORM_DOMAIN__"
            - name: WOODPECKER_INTERNAL_URL
              value: "http://woodpecker-server.woodpecker.svc:80"
            - name: WOODPECKER_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: op-api-secrets
                  key: woodpecker-admin-token
            - name: PLATFORM_DOMAIN
              value: "__PLATFORM_DOMAIN__"
            - name: SERVICE_PREFIX
              value: "__SERVICE_PREFIX__"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: console-db
                  key: database-url
            - name: FORGEJO_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin-credentials
                  key: username
            - name: FORGEJO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin-credentials
                  key: password
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: op-api-secrets
                  key: webhook-secret
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: api-key
                  optional: true
            - name: MCP_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: op-api-oauth
                  key: client-id
                  optional: true
            - name: MCP_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: op-api-oauth
                  key: client-secret
                  optional: true
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/certs/ca-bundle.crt"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          volumeMounts:
            - name: platform-ca
              mountPath: /etc/ssl/custom
              readOnly: true
            - name: merged-ca
              mountPath: /etc/ssl/certs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: platform-ca
          configMap:
            name: platform-ca
            optional: true
        - name: merged-ca
          emptyDir: {}
