apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: op-api
  namespace: APP_NAMESPACE
spec:
  ingressClassName: traefik
  rules:
    - host: __SERVICE_PREFIX__api.__PLATFORM_DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: op-api
                port:
                  number: 80
