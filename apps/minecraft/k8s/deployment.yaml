apiVersion: apps/v1
kind: Deployment
metadata:
  name: PROJECT_NAME
  namespace: APP_NAMESPACE
  labels:
    app: PROJECT_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: PROJECT_NAME
  template:
    metadata:
      labels:
        app: PROJECT_NAME
    spec:
      serviceAccountName: minecraft-manager
      imagePullSecrets:
        - name: forgejo-registry
      containers:
        - name: app
          image: forgejo.PLATFORM_DOMAIN/ORG_NAME/PROJECT_NAME:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgresql://DB_NAME:DB_NAME@postgres-rw.postgres.svc.cluster.local:5432/DB_NAME"
            - name: S3_ENDPOINT
              value: "http://minio.minio.svc:9000"
            - name: S3_BUCKET
              value: "APP_NAMESPACE"
            - name: S3_PUBLIC_URL
              value: "https://s3.PLATFORM_DOMAIN"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: rootUser
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: rootPassword
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: PROJECT_NAME-auth
                  key: secret
                  optional: true
            - name: AUTH_FORGEJO_ID
              valueFrom:
                secretKeyRef:
                  name: PROJECT_NAME-auth
                  key: client-id
                  optional: true
            - name: AUTH_FORGEJO_SECRET
              valueFrom:
                secretKeyRef:
                  name: PROJECT_NAME-auth
                  key: client-secret
                  optional: true
            - name: BETTER_AUTH_URL
              value: "https://PROJECT_NAME.PLATFORM_DOMAIN"
            - name: BETTER_AUTH_TRUSTED_ORIGINS
              value: "https://PROJECT_NAME.PLATFORM_DOMAIN"
            - name: AUTH_FORGEJO_URL
              value: "https://forgejo.PLATFORM_DOMAIN"
            - name: AUTH_FORGEJO_INTERNAL_URL
              value: "https://forgejo.PLATFORM_DOMAIN"
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/custom/ca.crt"
            - name: MINECRAFT_NAMESPACE
              value: "APP_NAMESPACE"
          volumeMounts:
            - name: platform-ca
              mountPath: /etc/ssl/custom
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: platform-ca
          configMap:
            name: platform-ca
