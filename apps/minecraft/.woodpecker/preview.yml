clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      skip_verify: true

when:
  - event: pull_request

steps:
  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: forgejo.dev.test
      repo: ${CI_REPO_OWNER}/${CI_REPO_NAME}
      tags:
        - "pr-${CI_COMMIT_PULL_REQUEST}"
      skip_tls_verify: true
      username:
        from_secret: registry_username
      password:
        from_secret: registry_token

  - name: provision
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    environment:
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_TOKEN:
        from_secret: registry_token
    commands:
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl create namespace $$PREVIEW_NS --dry-run=client -o yaml | kubectl apply -f -
        kubectl label namespace $$PREVIEW_NS \
          platform.dev.test/managed=true \
          platform.dev.test/org=${CI_REPO_OWNER} \
          platform.dev.test/repo=${CI_REPO_NAME} \
          platform.dev.test/tier=workload \
          platform.dev.test/environment=preview \
          platform.dev.test/pr=${CI_COMMIT_PULL_REQUEST} \
          --overwrite
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl get configmap platform-ca -n $$PREVIEW_NS 2>/dev/null || \
          kubectl get configmap platform-ca -n kube-system -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"kube-system"/"namespace": "'$$PREVIEW_NS'"/' | \
          kubectl apply -f -
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl get secret minio-credentials -n $$PREVIEW_NS 2>/dev/null || \
          kubectl get secret minio-credentials -n minio -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"minio"/"namespace": "'$$PREVIEW_NS'"/' | \
          kubectl apply -f -
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl get secret forgejo-registry -n $$PREVIEW_NS 2>/dev/null || \
          kubectl create secret docker-registry forgejo-registry \
          --docker-server=forgejo.dev.test \
          --docker-username=$${REGISTRY_USER} \
          --docker-password=$${REGISTRY_TOKEN} \
          -n $$PREVIEW_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        sed "s/APP_NAMESPACE/$$PREVIEW_NS/g" k8s/rbac.yaml | kubectl apply -f -
      - |
        export PREVIEW_DB="op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}"
        kubectl exec -n postgres postgres-1 -- psql -U postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname = '$$PREVIEW_DB'" | grep -q 1 || {
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE DATABASE $$PREVIEW_DB"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE USER $$PREVIEW_DB WITH PASSWORD '$$PREVIEW_DB'" || true
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE $$PREVIEW_DB TO $$PREVIEW_DB"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "ALTER DATABASE $$PREVIEW_DB OWNER TO $$PREVIEW_DB"
          touch .db-created
        }
      - |
        export PREVIEW_BUCKET="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl run minio-preview-$${CI_COMMIT_SHA:0:8} --rm -i --restart=Never \
          --image=minio/mc:latest -n minio \
          --overrides='{"spec":{"containers":[{"name":"minio-preview-'$${CI_COMMIT_SHA:0:8}'","image":"minio/mc:latest","command":["sh","-c"],"args":["mc alias set minio http://minio.minio.svc:9000 $(cat /minio/rootUser) $(cat /minio/rootPassword) && mc mb --ignore-existing minio/op-'${CI_REPO_OWNER}'-'${CI_REPO_NAME}'-pr-'${CI_COMMIT_PULL_REQUEST}' && mc anonymous set download minio/op-'${CI_REPO_OWNER}'-'${CI_REPO_NAME}'-pr-'${CI_COMMIT_PULL_REQUEST}'"],"volumeMounts":[{"name":"creds","mountPath":"/minio"}]}],"volumes":[{"name":"creds","secret":{"secretName":"minio-credentials"}}]}}'
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_NAME="pr-${CI_COMMIT_PULL_REQUEST}-${CI_REPO_NAME}"
        if kubectl get secret $$PREVIEW_NAME-auth -n $$PREVIEW_NS 2>/dev/null; then
          echo "Preview auth secret exists, skipping OAuth2 app creation"
        else
          FORGEJO_USER=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.username}' | base64 -d)
          FORGEJO_PASS=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.password}' | base64 -d)
          REDIRECT_URI="https://$$PREVIEW_NAME.dev.test/api/auth/oauth2/callback/forgejo"
          RESPONSE=$(curl -fsSk -u "$$FORGEJO_USER:$$FORGEJO_PASS" \
            -X POST "https://forgejo.dev.test/api/v1/user/applications/oauth2" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"$$PREVIEW_NAME\", \"redirect_uris\": [\"$$REDIRECT_URI\"], \"confidential_client\": false}")
          CLIENT_ID=$(echo "$$RESPONSE" | grep -o '"client_id":"[^"]*"' | head -1 | cut -d'"' -f4)
          CLIENT_SECRET=$(echo "$$RESPONSE" | grep -o '"client_secret":"[^"]*"' | head -1 | cut -d'"' -f4)
          AUTH_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 32)
          kubectl create secret generic $$PREVIEW_NAME-auth \
            -n $$PREVIEW_NS \
            --from-literal=client-id="$$CLIENT_ID" \
            --from-literal=client-secret="$$CLIENT_SECRET" \
            --from-literal=secret="$$AUTH_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Created OAuth2 app '$$PREVIEW_NAME' with redirect to $$REDIRECT_URI"
        fi

  - name: schema
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - |
        if [ -f schema.sql ]; then
          export PREVIEW_DB="op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}"
          kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB < schema.sql
          kubectl exec -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB -c \
            "GRANT ALL ON ALL TABLES IN SCHEMA public TO $$PREVIEW_DB; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO $$PREVIEW_DB;"
        fi

  - name: seed-sql
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - |
        if [ ! -f .db-created ]; then echo "DB already existed, skipping seed"; exit 0; fi
        export PREVIEW_DB="op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}"
        for f in $$(ls seed/sql/*.sql 2>/dev/null | sort); do
          kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB < "$$f"
        done

  - name: seed-data
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - |
        if [ ! -f .db-created ]; then echo "DB already existed, skipping seed"; exit 0; fi
        export PREVIEW_BUCKET="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        if [ -d seed/data ] && [ "$$(ls seed/data/*.* 2>/dev/null)" ]; then
          kubectl run minio-seed-$${CI_COMMIT_SHA:0:8} --rm -i --restart=Never \
            --image=minio/mc:latest -n minio \
            --overrides='{"spec":{"containers":[{"name":"minio-seed-'$${CI_COMMIT_SHA:0:8}'","image":"minio/mc:latest","command":["sh","-c"],"args":["mc alias set minio http://minio.minio.svc:9000 $(cat /minio/rootUser) $(cat /minio/rootPassword) && mc cp --recursive /data/ minio/op-'${CI_REPO_OWNER}'-'${CI_REPO_NAME}'-pr-'${CI_COMMIT_PULL_REQUEST}'/"],"volumeMounts":[{"name":"creds","mountPath":"/minio"},{"name":"data","mountPath":"/data"}]}],"volumes":[{"name":"creds","secret":{"secretName":"minio-credentials"}},{"name":"data","configMap":{"name":"seed-data"}}]}}'
        fi

  - name: deploy-preview
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_NAME="pr-${CI_COMMIT_PULL_REQUEST}-${CI_REPO_NAME}"
        export PREVIEW_DB="op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_BUCKET="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl apply -f - <<EOPREVIEW
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $$PREVIEW_NAME
          namespace: $$PREVIEW_NS
          labels:
            app: $$PREVIEW_NAME
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: $$PREVIEW_NAME
          template:
            metadata:
              labels:
                app: $$PREVIEW_NAME
            spec:
              serviceAccountName: minecraft-manager
              imagePullSecrets:
                - name: forgejo-registry
              containers:
                - name: app
                  image: forgejo.dev.test/${CI_REPO_OWNER}/${CI_REPO_NAME}:pr-${CI_COMMIT_PULL_REQUEST}
                  ports:
                    - containerPort: 3000
                  env:
                    - name: DATABASE_URL
                      value: "postgresql://$$PREVIEW_DB:$$PREVIEW_DB@postgres-rw.postgres.svc.cluster.local:5432/$$PREVIEW_DB"
                    - name: S3_ENDPOINT
                      value: "http://minio.minio.svc:9000"
                    - name: S3_PUBLIC_URL
                      value: "https://s3.dev.test"
                    - name: S3_BUCKET
                      value: "$$PREVIEW_BUCKET"
                    - name: S3_ACCESS_KEY
                      valueFrom:
                        secretKeyRef:
                          name: minio-credentials
                          key: rootUser
                    - name: S3_SECRET_KEY
                      valueFrom:
                        secretKeyRef:
                          name: minio-credentials
                          key: rootPassword
                    - name: BETTER_AUTH_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: $$PREVIEW_NAME-auth
                          key: secret
                          optional: true
                    - name: AUTH_FORGEJO_ID
                      valueFrom:
                        secretKeyRef:
                          name: $$PREVIEW_NAME-auth
                          key: client-id
                          optional: true
                    - name: AUTH_FORGEJO_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: $$PREVIEW_NAME-auth
                          key: client-secret
                          optional: true
                    - name: BETTER_AUTH_URL
                      value: "https://$$PREVIEW_NAME.dev.test"
                    - name: NODE_EXTRA_CA_CERTS
                      value: "/etc/ssl/custom/ca.crt"
                    - name: MINECRAFT_NAMESPACE
                      value: "$$PREVIEW_NS"
                  volumeMounts:
                    - name: platform-ca
                      mountPath: /etc/ssl/custom
                      readOnly: true
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "128Mi"
                    limits:
                      cpu: "300m"
                      memory: "384Mi"
              volumes:
                - name: platform-ca
                  configMap:
                    name: platform-ca
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: $$PREVIEW_NAME
          namespace: $$PREVIEW_NS
        spec:
          selector:
            app: $$PREVIEW_NAME
          ports:
            - port: 80
              targetPort: 3000
        ---
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: $$PREVIEW_NAME
          namespace: $$PREVIEW_NS
          annotations:
            traefik.ingress.kubernetes.io/router.middlewares: oauth2-proxy-oauth2-proxy-redirect@kubernetescrd,oauth2-proxy-oauth2-proxy-auth@kubernetescrd
        spec:
          ingressClassName: traefik
          rules:
            - host: $$PREVIEW_NAME.dev.test
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: $$PREVIEW_NAME
                        port:
                          number: 80
        EOPREVIEW
      - |
        PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        PREVIEW_NAME="pr-${CI_COMMIT_PULL_REQUEST}-${CI_REPO_NAME}"
        kubectl rollout status deployment/$$PREVIEW_NAME -n $$PREVIEW_NS --timeout=120s

  - name: comment-url
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - |
        export PREVIEW_NAME="pr-${CI_COMMIT_PULL_REQUEST}-${CI_REPO_NAME}"
        FORGEJO_USER=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.username}' | base64 -d)
        FORGEJO_PASS=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.password}' | base64 -d)
        curl -sk -X POST \
          -u "$$FORGEJO_USER:$$FORGEJO_PASS" \
          -H "Content-Type: application/json" \
          -d "{\"body\": \"Preview deployed: https://$$PREVIEW_NAME.dev.test\"}" \
          "https://forgejo.dev.test/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/issues/${CI_COMMIT_PULL_REQUEST}/comments"
