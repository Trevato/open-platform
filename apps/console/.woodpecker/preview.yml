clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      skip_verify: true

when:
  - event: pull_request

steps:
  - name: typecheck
    image: node:20-alpine
    commands:
      - npm install
      - npm run typecheck

  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      registry:
        from_secret: registry_push_host
      repo: ${CI_REPO_OWNER}/${CI_REPO_NAME}
      tags:
        - "pr-${CI_COMMIT_PULL_REQUEST}"
      skip_tls_verify: true
      cache: true
      cache_repo: ${CI_REPO_OWNER}/cache
      username:
        from_secret: registry_username
      password:
        from_secret: registry_token

  - name: provision
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    environment:
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_TOKEN:
        from_secret: registry_token
      REGISTRY_HOST:
        from_secret: registry_host
      PLATFORM_DOMAIN:
        from_secret: platform_domain
    commands:
      - |
        export PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_DB=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}" | tr '-' '_')
        kubectl create namespace $$PREVIEW_NS --dry-run=client -o yaml | kubectl apply -f -
        kubectl label namespace $$PREVIEW_NS \
          open-platform.sh/managed=true \
          open-platform.sh/org=${CI_REPO_OWNER} \
          open-platform.sh/repo=${CI_REPO_NAME} \
          open-platform.sh/tier=workload \
          open-platform.sh/environment=preview \
          open-platform.sh/pr=${CI_COMMIT_PULL_REQUEST} \
          --overwrite
      - |
        export PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl get configmap platform-ca -n $$PREVIEW_NS 2>/dev/null || \
          kubectl get configmap platform-ca -n kube-system -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"kube-system"/"namespace": "'$$PREVIEW_NS'"/' | \
          kubectl apply -f -
      - |
        export PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl create secret docker-registry forgejo-registry \
          --docker-server=$REGISTRY_HOST \
          --docker-username=$${REGISTRY_USER} \
          --docker-password=$${REGISTRY_TOKEN} \
          -n $$PREVIEW_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        export PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_NAME="${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        if kubectl get secret $$PREVIEW_NAME-auth -n $$PREVIEW_NS -o jsonpath='{.data.client-id}' 2>/dev/null | base64 -d 2>/dev/null | grep -q .; then
          echo "Preview auth secret exists with OAuth2 credentials, skipping"
        else
          FORGEJO_USER=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.username}' | base64 -d)
          FORGEJO_PASS=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.password}' | base64 -d)
          REDIRECT_URI="https://$$PREVIEW_NAME.$PLATFORM_DOMAIN/api/auth/oauth2/callback/forgejo"
          RESPONSE=$(curl -fsSk -u "$$FORGEJO_USER:$$FORGEJO_PASS" \
            -X POST "https://$REGISTRY_HOST/api/v1/user/applications/oauth2" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"$$PREVIEW_NAME\", \"redirect_uris\": [\"$$REDIRECT_URI\"], \"confidential_client\": false}")
          CLIENT_ID=$(echo "$$RESPONSE" | grep -o '"client_id":"[^"]*"' | head -1 | cut -d'"' -f4)
          CLIENT_SECRET=$(echo "$$RESPONSE" | grep -o '"client_secret":"[^"]*"' | head -1 | cut -d'"' -f4)
          AUTH_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 32)
          kubectl create secret generic $$PREVIEW_NAME-auth \
            -n $$PREVIEW_NS \
            --from-literal=client-id="$$CLIENT_ID" \
            --from-literal=client-secret="$$CLIENT_SECRET" \
            --from-literal=secret="$$AUTH_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Created OAuth2 app '$$PREVIEW_NAME' with redirect to $$REDIRECT_URI"
        fi
      - |
        export PREVIEW_DB=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}" | tr '-' '_')
        kubectl exec -n postgres postgres-1 -- psql -U postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname = '$$PREVIEW_DB'" | grep -q 1 || {
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE DATABASE $$PREVIEW_DB"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE USER $$PREVIEW_DB WITH PASSWORD '$$PREVIEW_DB'" || true
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE $$PREVIEW_DB TO $$PREVIEW_DB"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "ALTER DATABASE $$PREVIEW_DB OWNER TO $$PREVIEW_DB"
        }

  - name: schema
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - |
        if [ -f schema.sql ]; then
          export PREVIEW_DB=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}" | tr '-' '_')
          kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB < schema.sql
          kubectl exec -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB -c \
            "GRANT ALL ON ALL TABLES IN SCHEMA public TO $$PREVIEW_DB; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO $$PREVIEW_DB;"
        fi
      - |
        export PREVIEW_DB=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}" | tr '-' '_')
        echo "Granting provisioner access to preview database $$PREVIEW_DB..."
        kubectl exec -n postgres postgres-1 -- psql -U postgres -c "GRANT CONNECT ON DATABASE $$PREVIEW_DB TO op_system_console"
        kubectl exec -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB -c "GRANT ALL ON ALL TABLES IN SCHEMA public TO op_system_console"
        kubectl exec -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB -c "GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO op_system_console"
        kubectl exec -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO op_system_console"
        kubectl exec -n postgres postgres-1 -- psql -U postgres -d $$PREVIEW_DB -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO op_system_console"

  - name: deploy-preview
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    environment:
      REGISTRY_HOST:
        from_secret: registry_host
      PLATFORM_DOMAIN:
        from_secret: platform_domain
    commands:
      - |
        export PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_NAME="${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_DB=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}_pr_${CI_COMMIT_PULL_REQUEST}" | tr '-' '_')
        kubectl apply -f - <<EOPREVIEW
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $$PREVIEW_NAME
          namespace: $$PREVIEW_NS
          labels:
            app: $$PREVIEW_NAME
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: $$PREVIEW_NAME
          template:
            metadata:
              labels:
                app: $$PREVIEW_NAME
            spec:
              imagePullSecrets:
                - name: forgejo-registry
              containers:
                - name: app
                  image: $REGISTRY_HOST/${CI_REPO_OWNER}/${CI_REPO_NAME}:pr-${CI_COMMIT_PULL_REQUEST}
                  imagePullPolicy: Always
                  ports:
                    - containerPort: 3000
                  env:
                    - name: DATABASE_URL
                      value: "postgresql://$$PREVIEW_DB:$$PREVIEW_DB@postgres-rw.postgres.svc.cluster.local:5432/$$PREVIEW_DB"
                    - name: BETTER_AUTH_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: $$PREVIEW_NAME-auth
                          key: secret
                          optional: true
                    - name: AUTH_FORGEJO_ID
                      valueFrom:
                        secretKeyRef:
                          name: $$PREVIEW_NAME-auth
                          key: client-id
                          optional: true
                    - name: AUTH_FORGEJO_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: $$PREVIEW_NAME-auth
                          key: client-secret
                          optional: true
                    - name: BETTER_AUTH_URL
                      value: "https://$$PREVIEW_NAME.$PLATFORM_DOMAIN"
                    - name: BETTER_AUTH_TRUSTED_ORIGINS
                      value: "https://$$PREVIEW_NAME.$PLATFORM_DOMAIN"
                    - name: AUTH_FORGEJO_URL
                      value: "https://$REGISTRY_HOST"
                    - name: AUTH_FORGEJO_INTERNAL_URL
                      value: "https://$REGISTRY_HOST"
                    - name: PLATFORM_DOMAIN
                      value: "$PLATFORM_DOMAIN"
                    - name: NEXT_PUBLIC_PLATFORM_DOMAIN
                      value: "$PLATFORM_DOMAIN"
                    - name: NODE_EXTRA_CA_CERTS
                      value: "/etc/ssl/custom/ca.crt"
                    - name: NODE_TLS_REJECT_UNAUTHORIZED
                      value: "0"
                  volumeMounts:
                    - name: platform-ca
                      mountPath: /etc/ssl/custom
                      readOnly: true
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "128Mi"
                    limits:
                      cpu: "300m"
                      memory: "384Mi"
              volumes:
                - name: platform-ca
                  configMap:
                    name: platform-ca
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: $$PREVIEW_NAME
          namespace: $$PREVIEW_NS
        spec:
          selector:
            app: $$PREVIEW_NAME
          ports:
            - port: 80
              targetPort: 3000
        ---
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: $$PREVIEW_NAME
          namespace: $$PREVIEW_NS
        spec:
          ingressClassName: traefik
          rules:
            - host: $$PREVIEW_NAME.$PLATFORM_DOMAIN
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: $$PREVIEW_NAME
                        port:
                          number: 80
        EOPREVIEW
      - |
        export PREVIEW_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        export PREVIEW_NAME="${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        kubectl rollout restart deployment/$$PREVIEW_NAME -n $$PREVIEW_NS
        kubectl rollout status deployment/$$PREVIEW_NAME -n $$PREVIEW_NS --timeout=120s

  - name: comment-url
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    environment:
      REGISTRY_HOST:
        from_secret: registry_host
      PLATFORM_DOMAIN:
        from_secret: platform_domain
    commands:
      - |
        export PREVIEW_NAME="${CI_REPO_OWNER}-${CI_REPO_NAME}-pr-${CI_COMMIT_PULL_REQUEST}"
        FORGEJO_USER=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.username}' | base64 -d)
        FORGEJO_PASS=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.password}' | base64 -d)
        curl -sk -X POST \
          -u "$$FORGEJO_USER:$$FORGEJO_PASS" \
          -H "Content-Type: application/json" \
          -d "{\"body\": \"Preview deployed: https://$$PREVIEW_NAME.$PLATFORM_DOMAIN\"}" \
          "https://$REGISTRY_HOST/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/issues/${CI_COMMIT_PULL_REQUEST}/comments"
