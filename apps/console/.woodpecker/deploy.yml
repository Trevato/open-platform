clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      skip_verify: true

when:
  - event: [push, manual]
    branch: main

steps:
  - name: typecheck
    image: node:20-alpine
    commands:
      - apk add --no-cache python3 make g++
      - npm install
      - npm run typecheck

  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      registry:
        from_secret: registry_host
      repo: ${CI_REPO_OWNER}/${CI_REPO_NAME}
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      skip_tls_verify: true
      cache: true
      cache_repo: ${CI_REPO_OWNER}/cache
      username:
        from_secret: registry_username
      password:
        from_secret: registry_token

  - name: provision
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - kubectl create namespace $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl label namespace $APP_NS \
          open-platform.sh/managed=true \
          open-platform.sh/org=${CI_REPO_OWNER} \
          open-platform.sh/repo=${CI_REPO_NAME} \
          open-platform.sh/tier=workload \
          open-platform.sh/environment=production \
          --overwrite
      - |
        kubectl get configmap platform-ca -n kube-system -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"kube-system"/"namespace": "'$APP_NS'"/' | \
          kubectl apply -f -
      - |
        kubectl create secret docker-registry forgejo-registry \
          --docker-server=forgejo.$PLATFORM_DOMAIN \
          --docker-username=$${REGISTRY_USER} \
          --docker-password=$${REGISTRY_TOKEN} \
          -n $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE DATABASE $DB_NAME" 2>/dev/null || true
        kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE USER $DB_NAME WITH PASSWORD '$DB_NAME'" 2>/dev/null || true
        kubectl exec -n postgres postgres-1 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_NAME" || true
        kubectl exec -n postgres postgres-1 -- psql -U postgres -c "ALTER DATABASE $DB_NAME OWNER TO $DB_NAME" || true
    environment:
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_TOKEN:
        from_secret: registry_token
      PLATFORM_DOMAIN:
        from_secret: platform_domain

  - name: schema
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - |
        if [ -f schema.sql ]; then
          kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $DB_NAME < schema.sql
          kubectl exec -n postgres postgres-1 -- psql -U postgres -d $DB_NAME -c \
            "GRANT ALL ON ALL TABLES IN SCHEMA public TO $DB_NAME; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO $DB_NAME;"
        fi

  - name: deploy
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - sed -i "s/APP_NAMESPACE/$APP_NS/g; s/DB_NAME/$DB_NAME/g; s/PROJECT_NAME/${CI_REPO_NAME}/g; s/ORG_NAME/${CI_REPO_OWNER}/g; s/PLATFORM_DOMAIN/$PLATFORM_DOMAIN/g; s/SERVICE_PREFIX/$SERVICE_PREFIX/g" k8s/*.yaml
      - sed -i "s/:latest/:${CI_COMMIT_SHA:0:8}/g" k8s/deployment.yaml
      - |
        kubectl get secret forgejo-admin-credentials -n forgejo -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d; /"namespace"/d' | \
          kubectl apply -n $APP_NS -f - 2>/dev/null || true
      - kubectl apply -f k8s/rbac.yaml 2>/dev/null || true
      - kubectl apply -f k8s/deployment.yaml -f k8s/service.yaml -f k8s/ingress.yaml
      - kubectl set env deployment/${CI_REPO_NAME} -n $APP_NS PLATFORM_DOMAIN=$PLATFORM_DOMAIN SERVICE_PREFIX=$SERVICE_PREFIX
      - kubectl rollout status deployment/${CI_REPO_NAME} -n $APP_NS --timeout=120s
    environment:
      PLATFORM_DOMAIN:
        from_secret: platform_domain
      SERVICE_PREFIX: ""
