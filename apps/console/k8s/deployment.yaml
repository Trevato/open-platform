apiVersion: apps/v1
kind: Deployment
metadata:
  name: PROJECT_NAME
  namespace: APP_NAMESPACE
  labels:
    app: PROJECT_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: PROJECT_NAME
  template:
    metadata:
      labels:
        app: PROJECT_NAME
    spec:
      serviceAccountName: console
      imagePullSecrets:
        - name: forgejo-registry
      containers:
        - name: app
          image: REGISTRY_HOST/ORG_NAME/PROJECT_NAME:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: "postgresql://DB_NAME:DB_NAME@postgres-rw.postgres.svc.cluster.local:5432/DB_NAME"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: PROJECT_NAME-auth
                  key: secret
                  optional: true
            - name: AUTH_FORGEJO_ID
              valueFrom:
                secretKeyRef:
                  name: PROJECT_NAME-auth
                  key: client-id
                  optional: true
            - name: AUTH_FORGEJO_SECRET
              valueFrom:
                secretKeyRef:
                  name: PROJECT_NAME-auth
                  key: client-secret
                  optional: true
            - name: BETTER_AUTH_URL
              value: "https://SERVICE_PREFIXconsole.PLATFORM_DOMAIN"
            - name: BETTER_AUTH_TRUSTED_ORIGINS
              value: "https://SERVICE_PREFIXconsole.PLATFORM_DOMAIN"
            - name: AUTH_FORGEJO_URL
              value: "https://REGISTRY_HOST"
            - name: AUTH_FORGEJO_INTERNAL_URL
              value: "http://forgejo-http.forgejo.svc.cluster.local:3000"
            - name: CONSOLE_MODE
              value: "platform"
            - name: PLATFORM_DOMAIN
              value: "PLATFORM_DOMAIN"
            - name: SERVICE_PREFIX
              value: "SERVICE_PREFIX"
            - name: FORGEJO_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin-credentials
                  key: username
                  optional: true
            - name: FORGEJO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin-credentials
                  key: password
                  optional: true
            - name: MANAGED_DOMAIN
              value: "PLATFORM_DOMAIN"
            - name: NEXT_PUBLIC_MANAGED_DOMAIN
              value: "PLATFORM_DOMAIN"
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/custom/ca.crt"
          volumeMounts:
            - name: platform-ca
              mountPath: /etc/ssl/custom
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: platform-ca
          configMap:
            name: platform-ca
