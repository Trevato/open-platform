apiVersion: v1
kind: ServiceAccount
metadata:
  name: console
  namespace: APP_NAMESPACE
---
# Console communicates exclusively through op-api — no direct K8s access needed.
# Minimal ClusterRole with no permissions, retained for ServiceAccount mounting.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: console
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: console
subjects:
  - kind: ServiceAccount
    name: console
    namespace: APP_NAMESPACE
