apiVersion: v1
kind: ServiceAccount
metadata:
  name: console
  namespace: APP_NAMESPACE
---
# Console ws-server needs direct K8s access for dev pod terminal exec.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: console
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: console
subjects:
  - kind: ServiceAccount
    name: console
    namespace: APP_NAMESPACE
