apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: PROJECT_NAME
  namespace: APP_NAMESPACE
spec:
  ingressClassName: traefik
  rules:
    - host: PROJECT_NAME.dev.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: PROJECT_NAME
                port:
                  number: 80
    - host: PROJECT_NAME.product-garden.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: PROJECT_NAME
                port:
                  number: 80
