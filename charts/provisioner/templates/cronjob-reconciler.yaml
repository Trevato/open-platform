{{- $forgejoUrl := urlParse .Values.forgejo.internalUrl -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "provisioner.fullname" . }}-reconciler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "provisioner.labels" . | nindent 4 }}
    component: reconciler
spec:
  schedule: {{ .Values.schedule.reconciler | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 10
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 0
      template:
        metadata:
          labels:
            {{- include "provisioner.selectorLabels" . | nindent 12 }}
            component: reconciler
        spec:
          serviceAccountName: {{ include "provisioner.fullname" . }}
          restartPolicy: Never
          initContainers:
            - name: clone-repo
              image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  git clone "{{ $forgejoUrl.scheme }}://${FORGEJO_USER}:${FORGEJO_PASS}@{{ $forgejoUrl.host }}/{{ .Values.platform.repoUrl }}.git" /repo
              env:
                - name: FORGEJO_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.forgejo.secretName }}
                      key: username
                - name: FORGEJO_PASS
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.forgejo.secretName }}
                      key: password
              volumeMounts:
                - name: repo
                  mountPath: /repo
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          containers:
            - name: reconciler
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache bash curl jq openssl git postgresql16-client >/dev/null 2>&1 &&
                  curl -sLo /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" &&
                  chmod +x /usr/local/bin/kubectl &&
                  helm repo add vcluster https://charts.loft.sh >/dev/null 2>&1 &&
                  helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true
                  wget -q https://github.com/helmfile/helmfile/releases/download/v1.1.9/helmfile_1.1.9_linux_amd64.tar.gz -O /tmp/hf.tar.gz &&
                  tar xzf /tmp/hf.tar.gz -C /usr/local/bin helmfile &&
                  chmod +x /repo/scripts/*.sh 2>/dev/null || true
                  exec bash /provisioner/reconciler.sh
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: port
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: database
                - name: PLATFORM_DOMAIN
                  value: {{ required "platform.domain is required" .Values.platform.domain | quote }}
              resources:
                requests:
                  cpu: {{ .Values.resources.requests.cpu }}
                  memory: {{ .Values.resources.requests.memory }}
                limits:
                  cpu: {{ .Values.resources.limits.cpu | quote }}
                  memory: {{ .Values.resources.limits.memory }}
              volumeMounts:
                - name: provisioner-scripts
                  mountPath: /provisioner
                  readOnly: true
                - name: repo
                  mountPath: /repo
          volumes:
            - name: provisioner-scripts
              configMap:
                name: {{ include "provisioner.fullname" . }}-scripts
                defaultMode: 0755
            - name: repo
              emptyDir: {}
