apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "provisioner.fullname" . }}-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "provisioner.labels" . | nindent 4 }}
    component: health-check
spec:
  schedule: {{ .Values.schedule.healthCheck | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 0
      template:
        metadata:
          labels:
            {{- include "provisioner.selectorLabels" . | nindent 12 }}
            component: health-check
        spec:
          serviceAccountName: {{ include "provisioner.fullname" . }}
          restartPolicy: Never
          containers:
            - name: health-check
              image: "{{ .Values.healthImage.repository }}:{{ .Values.healthImage.tag }}"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache bash curl postgresql16-client jq >/dev/null 2>&1 &&
                  exec bash /provisioner/health-check.sh
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: port
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.db.secretName }}
                      key: database
                - name: PLATFORM_DOMAIN
                  value: {{ required "platform.domain is required" .Values.platform.domain | quote }}
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              volumeMounts:
                - name: provisioner-scripts
                  mountPath: /provisioner
                  readOnly: true
          volumes:
            - name: provisioner-scripts
              configMap:
                name: {{ include "provisioner.fullname" . }}-scripts
                defaultMode: 0755
