{{/*
Platform CA ConfigMaps — distributes the self-signed CA cert to services that need
TLS verification against Forgejo (Jitsi OIDC adapter, pgAdmin).
Only applies when using self-signed certs (selfsigned or cloudflare mode).
*/}}
{{- if and (ne (include "op.tlsMode" .) "letsencrypt") .Values.tls.ca.cert }}
{{- $namespaces := list "kube-system" }}
{{- if .Values.services.jitsi.enabled }}
{{- $namespaces = append $namespaces "jitsi" }}
{{- end }}
{{- if .Values.services.pgadmin.enabled }}
{{- $namespaces = append $namespaces "pgadmin" }}
{{- end }}
{{- if .Values.services.zulip.enabled }}
{{- $namespaces = append $namespaces "zulip" }}
{{- end }}
{{- range $ns := $namespaces }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-ca
  namespace: {{ $ns }}
  labels:
    {{- include "op.labels" $ | nindent 4 }}
data:
  ca.crt: |
    {{- $.Values.tls.ca.cert | nindent 4 }}
{{- end }}
{{- end }}
