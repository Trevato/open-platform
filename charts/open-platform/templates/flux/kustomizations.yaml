{{- if or (eq (include "op.traefikInstall" .) "true") (eq (include "op.cnpgInstall" .) "true") }}
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: open-platform
  path: ./platform/infrastructure/controllers
  prune: false
  wait: true
---
{{- end }}
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  {{- if or (eq (include "op.traefikInstall" .) "true") (eq (include "op.cnpgInstall" .) "true") }}
  dependsOn:
    - name: infra-controllers
  {{- end }}
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: open-platform
  path: ./platform/infrastructure/configs
  prune: false
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: identity
  namespace: flux-system
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  dependsOn:
    - name: infra-configs
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: open-platform
  path: ./platform/identity
  prune: false
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  dependsOn:
    - name: identity
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: open-platform
  path: ./platform/apps
  prune: false
  wait: true
