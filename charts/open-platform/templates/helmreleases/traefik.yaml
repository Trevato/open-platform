{{- if eq .Values.infrastructure.mode "bundled" }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    api:
      dashboard: true
      insecure: true
    logs:
      access:
        enabled: true
    {{- if eq .Values.network.mode "host" }}
    deployment:
      kind: DaemonSet
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    hostNetwork: true
    securityContext:
      capabilities:
        drop:
          - ALL
        add:
          - NET_BIND_SERVICE
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
    {{- end }}
    {{- if eq .Values.network.mode "loadbalancer" }}
    deployment:
      kind: Deployment
      replicas: 2
    {{- end }}
    ports:
      web:
        port: 80
      websecure:
        port: 443
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
        allowEmptyServices: true
        allowCrossNamespace: true
      kubernetesIngress:
        allowExternalNameServices: true
        allowEmptyServices: true
    {{- if eq .Values.network.mode "host" }}
    service:
      type: ClusterIP
    {{- end }}
    {{- if eq .Values.network.mode "loadbalancer" }}
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/address-pool: shared-infra
      spec:
        loadBalancerIP: {{ .Values.network.traefikIp }}
        externalTrafficPolicy: Local
    {{- end }}
{{- end }}
