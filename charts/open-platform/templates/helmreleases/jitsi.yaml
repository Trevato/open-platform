{{- if and (eq .Values.infrastructure.mode "bundled") .Values.services.jitsi.enabled }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jitsi
  namespace: jitsi
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: jitsi-meet
      version: "2.13.1"
      sourceRef:
        kind: HelmRepository
        name: jitsi
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  values:
    publicURL: {{ include "op.svcUrl" (list . "meet") | quote }}
    enableAuth: true
    enableGuests: {{ .Values.services.jitsi.allowGuests }}
    extraCommonEnvs:
      AUTH_TYPE: jwt
      JWT_APP_ID: "jitsi"
    web:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: {{ include "op.svcHost" (list . "meet") }}
            paths: ["/"]
      extraEnvs:
        TOKEN_AUTH_URL: {{ printf "https://%s/room/{room}" (include "op.svcHost" (list . "meet-auth")) | quote }}
      extraContainers:
        - name: ca-bundle-builder
          image: alpine:3.22
          command: [sh, -c]
          args:
            - |
              cat /etc/ssl/certs/ca-certificates.crt /platform-ca/ca.crt > /custom-certs/ca-certificates.crt 2>/dev/null || cp /etc/ssl/certs/ca-certificates.crt /custom-certs/ca-certificates.crt
              sleep infinity
          volumeMounts:
            - name: platform-ca
              mountPath: /platform-ca
              readOnly: true
            - name: custom-certs
              mountPath: /custom-certs
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
        - name: jitsi-oidc
          image: ghcr.io/marcelcoding/jitsi-openid:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: JITSI_SECRET
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JWT_APP_SECRET
            - name: JITSI_URL
              value: {{ include "op.svcUrl" (list . "meet") | quote }}
            - name: JITSI_SUB
              value: {{ include "op.svcHost" (list . "meet") | quote }}
            - name: ISSUER_URL
              value: {{ include "op.forgejoUrl" . | quote }}
            - name: BASE_URL
              value: {{ include "op.svcUrl" (list . "meet-auth") | quote }}
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: jitsi-oidc
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jitsi-oidc
                  key: client-secret
            - name: VERIFY_ACCESS_TOKEN_HASH
              value: "false"
            - name: SSL_CERT_FILE
              value: /custom-certs/ca-certificates.crt
          volumeMounts:
            - name: custom-certs
              mountPath: /custom-certs
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      extraVolumes:
        - name: platform-ca
          configMap:
            name: platform-ca
            optional: true
        - name: custom-certs
          emptyDir: {}
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
    prosody:
      jwt:
        existingSecretName: jitsi-secrets
      {{- if .Values.multinode.enabled }}
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 60
              preference:
                matchExpressions:
                  - key: open-platform.sh/node-role
                    operator: In
                    values:
                      - infra
      {{- end }}
      persistence:
        enabled: true
        size: 5Gi
    jicofo:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
    jvb:
      replicaCount: 1
      publicIPs:
        - {{ .Values.services.jitsi.jvbAdvertiseIp | quote }}
      useNodeIP: false
      stunServers: "stun.l.google.com:19302"
      UDPPort: 10000
      service:
        enabled: true
        type: NodePort
        nodePort: 10000
      resources:
        requests:
          memory: 512Mi
          cpu: 500m
        limits:
          memory: 2Gi
          cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-oidc
  namespace: jitsi
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: jitsi-meet
    app.kubernetes.io/component: web
    app.kubernetes.io/instance: jitsi
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jitsi-oidc
  namespace: jitsi
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ include "op.svcHost" (list . "meet-auth") }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jitsi-oidc
                port:
                  number: 80
{{- end }}
