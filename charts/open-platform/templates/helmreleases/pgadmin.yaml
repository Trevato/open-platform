{{- if and (eq .Values.infrastructure.mode "bundled") .Values.services.pgadmin.enabled }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin
  namespace: pgadmin
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: pgadmin4
      version: "1.62.0"
      sourceRef:
        kind: HelmRepository
        name: runix
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  values:
    env:
      email: {{ include "op.adminEmail" . | quote }}
      variables:
        - name: PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY
          value: "False"
        - name: PGADMIN_CONFIG_GLOBALLY_DELIVERABLE
          value: "False"
        - name: PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS
          value: {{ printf "['%s']" (include "op.domainTld" .) | quote }}
        - name: REQUESTS_CA_BUNDLE
          value: "/etc/ssl/certs/platform-ca.crt"
        - name: PGADMIN_CONFIG_ALLOW_SAVE_PASSWORD
          value: "True"
    existingSecret: pgadmin-secrets
    envVarsFromSecrets:
      - pgadmin-secrets
    serverDefinitions:
      enabled: true
      servers:
        "1":
          Name: "Platform PostgreSQL"
          Group: "Platform"
          Host: "postgres-rw.postgres.svc.cluster.local"
          Port: 5432
          Username: "postgres"
          SSLMode: "prefer"
          MaintenanceDB: "postgres"
          Shared: true
          SharedUsername: "postgres"
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: {{ include "op.svcHost" (list . "db") }}
          paths:
            - path: /
              pathType: Prefix
    persistentVolume:
      enabled: true
      size: 1Gi
    extraConfigmapMounts:
      - name: pgadmin-oauth-config
        configMap: pgadmin-oauth-config
        subPath: config_local.py
        mountPath: /pgadmin4/config_local.py
        readOnly: true
    extraVolumes:
      - name: platform-ca
        configMap:
          name: platform-ca
    extraVolumeMounts:
      - name: platform-ca
        mountPath: /etc/ssl/certs/platform-ca.crt
        subPath: ca.crt
        readOnly: true
    startupProbe:
      failureThreshold: 60
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 512Mi
        cpu: 250m
{{- end }}
