{{- if and (eq .Values.infrastructure.mode "bundled") .Values.services.zulip.enabled }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zulip
  namespace: zulip
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  interval: 15m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: zulip
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  values:
    {{- if .Values.multinode.enabled }}
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 60
            preference:
              matchExpressions:
                - key: open-platform.sh/node-role
                  operator: In
                  values:
                    - infra
    {{- end }}
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: {{ include "op.svcHost" (list . "chat") }}
          paths:
            - path: /
    resources:
      requests:
        memory: 1Gi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "2"
    zulip:
      environment:
        SETTING_EXTERNAL_HOST: {{ include "op.svcHost" (list . "chat") | quote }}
        SETTING_ZULIP_ADMINISTRATOR: {{ include "op.adminEmail" . | quote }}
        DISABLE_HTTPS: "true"
        SSL_CERTIFICATE_GENERATION: "self-signed"
        SETTING_SECURE_PROXY_SSL_HEADER: "('HTTP_X_FORWARDED_PROTO', 'https')"
        LOADBALANCER_IPS: "0.0.0.0/0"
        SETTING_CSRF_TRUSTED_ORIGINS: {{ printf "[\"https://%s\"]" (include "op.svcHost" (list . "chat")) | quote }}
        SETTING_SOCIAL_AUTH_REDIRECT_IS_HTTPS: "True"
        SETTING_EMAIL_HOST: {{ include "op.smtpHost" . | quote }}
        SETTING_EMAIL_HOST_PORT: {{ include "op.smtpPort" . | quote }}
        SETTING_EMAIL_USE_TLS: "false"
        SETTING_DEFAULT_FROM_EMAIL: {{ printf "zulip@%s" (include "op.domain" .) | quote }}
        SETTING_NOREPLY_EMAIL_ADDRESS: {{ printf "noreply@%s" (include "op.domain" .) | quote }}
        ZULIP_AUTH_BACKENDS: "GenericOpenIdConnectBackend"
        # Disable PKCE — confidential client doesn't need it, and the code_verifier
        # gets lost between Zulip's authorization redirect and callback.
        SETTING_SOCIAL_AUTH_OIDC_PKCE_ENABLED: "False"
        # Allow OIDC users to sign up without invitation
        SETTING_INVITATION_REQUIRED: "False"
        OIDC_CLIENT_ID:
          valueFrom:
            secretKeyRef:
              name: zulip-secrets
              key: oidc-client-id
        OIDC_CLIENT_SECRET:
          valueFrom:
            secretKeyRef:
              name: zulip-secrets
              key: oidc-client-secret
        SETTING_SOCIAL_AUTH_OIDC_ENABLED_IDPS: >-
          {"forgejo":{"oidc_url":{{ include "op.forgejoUrl" . | quote }},"display_name":"Forgejo","display_icon":None,"auto_signup":True,"client_id":"$(OIDC_CLIENT_ID)","secret":"$(OIDC_CLIENT_SECRET)"}}
      persistence:
        enabled: true
        size: 10Gi
    postSetup:
      scripts:
        {{- if ne (include "op.tlsMode" .) "letsencrypt" }}
        install-platform-ca.sh: |
          #!/bin/bash
          # Install the platform CA so OIDC discovery and token exchange work
          # against Forgejo's self-signed cert from inside the cluster.
          {{- $ca := lookup "v1" "ConfigMap" "kube-system" "platform-ca" }}
          {{- if and $ca $ca.data (index $ca.data "ca.crt") }}
          cat > /usr/local/share/ca-certificates/platform-ca.crt << 'CERT'
          {{- index $ca.data "ca.crt" | nindent 10 }}
          CERT
          {{- else }}
          # CA not yet in cluster (first install) — extract from TLS handshake
          FORGEJO_HOST="{{ include "op.svcHost" (list . "forgejo") }}"
          echo | openssl s_client -showcerts -servername "${FORGEJO_HOST}" \
            -connect "${FORGEJO_HOST}:443" 2>/dev/null | \
            awk 'c{cert=cert $0 ORS} /BEGIN CERT/{c=1; cert=$0 ORS} /END CERT/{c=0; last=cert}END{printf "%s",last}' \
            > /usr/local/share/ca-certificates/platform-ca.crt
          {{- end }}
          if [ -s /usr/local/share/ca-certificates/platform-ca.crt ]; then
            update-ca-certificates
            # python-social-auth (Zulip's OIDC) uses requests/certifi which has
            # its own CA bundle, separate from the system trust store.
            CERTIFI_BUNDLE=$(su zulip -c 'source /home/zulip/deployments/current/.venv/bin/activate && python3 -c "import certifi; print(certifi.where())"' 2>/dev/null)
            if [ -n "${CERTIFI_BUNDLE}" ] && [ -f "${CERTIFI_BUNDLE}" ]; then
              cat /usr/local/share/ca-certificates/platform-ca.crt >> "${CERTIFI_BUNDLE}"
            fi
            echo "Platform CA installed."
          fi
        {{- end }}
        configure-smokescreen.sh: |
          #!/bin/bash
          # Allow smokescreen to connect to cluster-internal IPs (service and pod CIDRs).
          # Without this, OIDC discovery fails because Forgejo resolves to a cluster IP
          # and smokescreen blocks private ranges by default.
          if ! grep -q '\[http_proxy\]' /etc/zulip/zulip.conf 2>/dev/null; then
            cat >> /etc/zulip/zulip.conf << 'EOF'

          [http_proxy]
          allow_ranges = 10.42.0.0/16,10.43.0.0/16
          EOF
            /home/zulip/deployments/current/scripts/zulip-puppet-apply --noop 2>/dev/null
            echo "y" | /home/zulip/deployments/current/scripts/zulip-puppet-apply 2>/dev/null
            echo "Smokescreen configured for cluster-internal IPs."
          fi
        create-realm.sh: |
          #!/bin/bash
          su zulip -c '/home/zulip/deployments/current/manage.py shell -c "
          from zerver.models import Realm
          if not Realm.objects.filter(string_id=\"\").exists():
              from zerver.actions.create_realm import do_create_realm
              realm = do_create_realm(\"\", \"Open Platform\")
              realm.invite_required = False
              realm.save()
              print(f\"Created realm: {realm.name} at {realm.host}\")
          else:
              r = Realm.objects.get(string_id=\"\")
              if r.invite_required:
                  r.invite_required = False
                  r.save()
                  print(\"Fixed: invite_required set to False\")
              print(\"Realm already exists\")
          "'
    # Use platform CNPG PostgreSQL cluster
    postgresql:
      enabled: false
    externalPostgresql:
      host: "postgres-rw.postgres.svc.cluster.local"
      port: 5432
      database: "zulip"
      user: "zulip"
      password:
        valueFrom:
          secretKeyRef:
            name: zulip-db-credentials
            key: password
    # Bitnami subcharts for Zulip-internal services
    rabbitmq:
      enabled: true
      auth:
        username: zulip
        existingPasswordSecret: zulip-secrets
        existingSecretPasswordKey: rabbitmq-password
      persistence:
        enabled: false
      resources:
        requests:
          memory: 128Mi
          cpu: 50m
        limits:
          memory: 512Mi
    memcached:
      enabled: true
      resources:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 256Mi
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      master:
        resources:
          requests:
            memory: 64Mi
            cpu: 25m
          limits:
            memory: 256Mi
{{- end }}
