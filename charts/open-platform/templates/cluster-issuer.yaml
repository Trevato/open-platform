{{/*
cert-manager ClusterIssuer — Let's Encrypt production issuer with HTTP-01 challenge.
Conditional on tls.mode=letsencrypt.
Ported from config/templates/platform/infrastructure/configs/cluster-issuer.yaml.tmpl
*/}}
{{- if eq (include "op.certManagerEnabled" .) "true" }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "op.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ include "op.tlsEmail" . }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
{{- end }}
