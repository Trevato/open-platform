{{/*
Bootstrap secrets — lookup-or-generate pattern.
Each secret is preserved across upgrades via helm.sh/resource-policy: keep.
Existing cluster values take priority, then .Values.secrets overrides, then random generation.
Ported from scripts/ensure-secrets.sh
*/}}
{{- define "op.secretValue" -}}
{{- /* Args: (list existingB64 overrideVal length) */ -}}
{{- $existing := index . 0 -}}
{{- $override := index . 1 -}}
{{- $length := index . 2 -}}
{{- if $existing -}}
  {{- $existing | b64dec -}}
{{- else if $override -}}
  {{- $override -}}
{{- else -}}
  {{- randAlphaNum ($length | int) -}}
{{- end -}}
{{- end }}

{{/* ---- forgejo-admin-credentials (forgejo) ---- */}}
{{- $faExisting := (lookup "v1" "Secret" "forgejo" "forgejo-admin-credentials").data | default dict }}
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-admin-credentials
  namespace: forgejo
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  username: {{ include "op.adminUser" . | b64enc | quote }}
  password: {{ include "op.secretValue" (list (index $faExisting "password") .Values.secrets.forgejoAdminPassword 32) | b64enc | quote }}

{{/* ---- forgejo-db-config (forgejo) ---- */}}
{{- $fdbcExisting := (lookup "v1" "Secret" "forgejo" "forgejo-db-config").data | default dict }}
{{- $forgejoDbPassword := include "op.secretValue" (list (index $fdbcExisting "password") .Values.secrets.forgejoDbPassword 32) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-db-config
  namespace: forgejo
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  password: {{ $forgejoDbPassword | b64enc | quote }}

{{/* ---- forgejo-db-credentials (postgres) — same password as forgejo-db-config ---- */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-db-credentials
  namespace: postgres
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  username: {{ "forgejo" | b64enc | quote }}
  password: {{ $forgejoDbPassword | b64enc | quote }}

{{/* ---- minio-credentials (minio) ---- */}}
{{- $minioExisting := (lookup "v1" "Secret" "minio" "minio-credentials").data | default dict }}
{{- $minioPassword := include "op.secretValue" (list (index $minioExisting "rootPassword") .Values.secrets.minioRootPassword 32) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: minio
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  rootUser: {{ "minioadmin" | b64enc | quote }}
  rootPassword: {{ $minioPassword | b64enc | quote }}

{{/* ---- woodpecker-secrets (woodpecker) ---- */}}
{{- $wpExisting := (lookup "v1" "Secret" "woodpecker" "woodpecker-secrets").data | default dict }}
---
apiVersion: v1
kind: Secret
metadata:
  name: woodpecker-secrets
  namespace: woodpecker
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  WOODPECKER_AGENT_SECRET: {{ include "op.secretValue" (list (index $wpExisting "WOODPECKER_AGENT_SECRET") .Values.secrets.woodpeckerAgentSecret 32) | b64enc | quote }}
  {{- /* Preserve OAuth2 creds if they exist from a previous bootstrap run */}}
  {{- if index $wpExisting "WOODPECKER_FORGEJO_CLIENT" }}
  WOODPECKER_FORGEJO_CLIENT: {{ index $wpExisting "WOODPECKER_FORGEJO_CLIENT" | quote }}
  WOODPECKER_FORGEJO_SECRET: {{ index $wpExisting "WOODPECKER_FORGEJO_SECRET" | quote }}
  {{- end }}

{{/* ---- oauth2-proxy-secrets (oauth2-proxy) ---- */}}
{{- $oaExisting := (lookup "v1" "Secret" "oauth2-proxy" "oauth2-proxy-secrets").data | default dict }}
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secrets
  namespace: oauth2-proxy
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  cookie-secret: {{ include "op.secretValue" (list (index $oaExisting "cookie-secret") .Values.secrets.oauth2ProxyCookieSecret 32) | b64enc | quote }}
  {{- /* Preserve OAuth2 client creds if they exist from a previous bootstrap run */}}
  {{- if index $oaExisting "client-id" }}
  client-id: {{ index $oaExisting "client-id" | quote }}
  client-secret: {{ index $oaExisting "client-secret" | quote }}
  {{- end }}

{{/* ---- forgejo-minio-config (forgejo) — same creds as MinIO ---- */}}
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-minio-config
  namespace: forgejo
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  accessKey: {{ "minioadmin" | b64enc | quote }}
  secretKey: {{ $minioPassword | b64enc | quote }}

{{/* ---- forgejo-smtp-config (forgejo) — only when external SMTP ---- */}}
{{- if .Values.smtp.external }}
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-smtp-config
  namespace: forgejo
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  username: {{ .Values.smtp.username | b64enc | quote }}
  password: {{ .Values.smtp.password | b64enc | quote }}
{{- end }}

{{/* ---- jitsi-secrets (jitsi) — conditional on jitsi.enabled ---- */}}
{{- if .Values.services.jitsi.enabled }}
{{- $jitsiExisting := (lookup "v1" "Secret" "jitsi" "jitsi-secrets").data | default dict }}
---
apiVersion: v1
kind: Secret
metadata:
  name: jitsi-secrets
  namespace: jitsi
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  JWT_APP_SECRET: {{ include "op.secretValue" (list (index $jitsiExisting "JWT_APP_SECRET") .Values.secrets.jitsiJwtSecret 32) | b64enc | quote }}
{{- end }}

{{/* ---- zulip-db-credentials (postgres + zulip) — conditional on zulip.enabled ---- */}}
{{- if .Values.services.zulip.enabled }}
{{- $zdbExisting := (lookup "v1" "Secret" "postgres" "zulip-db-credentials").data | default dict }}
{{- $zulipDbPassword := include "op.secretValue" (list (index $zdbExisting "password") .Values.secrets.zulipDbPassword 32) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: zulip-db-credentials
  namespace: postgres
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  username: {{ "zulip" | b64enc | quote }}
  password: {{ $zulipDbPassword | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: zulip-db-credentials
  namespace: zulip
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  username: {{ "zulip" | b64enc | quote }}
  password: {{ $zulipDbPassword | b64enc | quote }}

{{/* ---- zulip-secrets (zulip) ---- */}}
{{- $zsExisting := (lookup "v1" "Secret" "zulip" "zulip-secrets").data | default dict }}
---
apiVersion: v1
kind: Secret
metadata:
  name: zulip-secrets
  namespace: zulip
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  rabbitmq-password: {{ include "op.secretValue" (list (index $zsExisting "rabbitmq-password") .Values.secrets.zulipRabbitmqPassword 32) | b64enc | quote }}
  secret-key: {{ include "op.secretValue" (list (index $zsExisting "secret-key") .Values.secrets.zulipSecretKey 32) | b64enc | quote }}
  {{- /* Preserve OIDC creds if they exist from a previous bootstrap run */}}
  {{- if index $zsExisting "oidc-client-id" }}
  oidc-client-id: {{ index $zsExisting "oidc-client-id" | quote }}
  oidc-client-secret: {{ index $zsExisting "oidc-client-secret" | quote }}
  {{- end }}
{{- end }}

{{/* ---- cloudflared-credentials (cloudflare) — conditional on cloudflare ---- */}}
{{- if eq (include "op.cloudflareEnabled" .) "true" }}
{{- if and .Values.cloudflare.tunnelSecret .Values.cloudflare.tunnelId .Values.cloudflare.accountTag }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-credentials
  namespace: cloudflare
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  credentials.json: |
    {"AccountTag":"{{ .Values.cloudflare.accountTag }}","TunnelID":"{{ .Values.cloudflare.tunnelId }}","TunnelSecret":"{{ .Values.cloudflare.tunnelSecret }}"}
{{- end }}
{{- end }}

{{/* ---- wildcard-tls (kube-system) — conditional on cert/key being provided ---- */}}
{{- if and .Values.tls.wildcard.cert .Values.tls.wildcard.key }}
---
apiVersion: v1
kind: Secret
metadata:
  name: wildcard-tls
  namespace: kube-system
  labels:
    {{- include "op.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.tls.wildcard.cert | b64enc | quote }}
  tls.key: {{ .Values.tls.wildcard.key | b64enc | quote }}
{{- end }}
