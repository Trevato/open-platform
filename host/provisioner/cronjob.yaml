---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provisioner
  namespace: provisioner
  labels:
    app: provisioner
    open-platform.sh/managed: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provisioner-admin
  labels:
    app: provisioner
    open-platform.sh/managed: "true"
subjects:
  - kind: ServiceAccount
    name: provisioner
    namespace: provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
---
# Provisioner Reconciler CronJob
# Polls console DB for pending/terminating instances every minute.
# Init container clones the deploy-bundle repo from Forgejo.
# Main container installs tools and runs reconciler.sh.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: provisioner-reconciler
  namespace: provisioner
  labels:
    app: provisioner
    component: reconciler
    open-platform.sh/managed: "true"
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 10
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: provisioner
            component: reconciler
        spec:
          serviceAccountName: provisioner
          restartPolicy: Never
          initContainers:
            - name: clone-repo
              image: alpine/git:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  git clone "http://${FORGEJO_USER}:${FORGEJO_PASS}@${FORGEJO_HOST}/system/deploy-bundle.git" /repo
              env:
                - name: FORGEJO_HOST
                  value: "forgejo-http-x-forgejo-x-open-platform-sh.vc-open-platform-sh.svc.cluster.local:3000"
                - name: FORGEJO_USER
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-forgejo
                      key: username
                - name: FORGEJO_PASS
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-forgejo
                      key: password
              volumeMounts:
                - name: repo
                  mountPath: /repo
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          containers:
            - name: reconciler
              image: alpine/helm:3.16.4
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache bash curl jq openssl git postgresql16-client >/dev/null 2>&1 &&
                  curl -sLo /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" &&
                  chmod +x /usr/local/bin/kubectl &&
                  helm repo add vcluster https://charts.loft.sh >/dev/null 2>&1 &&
                  helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true
                  wget -q https://github.com/helmfile/helmfile/releases/download/v1.1.9/helmfile_1.1.9_linux_amd64.tar.gz -O /tmp/hf.tar.gz &&
                  tar xzf /tmp/hf.tar.gz -C /usr/local/bin helmfile &&
                  chmod +x /repo/scripts/*.sh &&
                  exec bash /provisioner/reconciler.sh
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: port
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: database
                - name: PLATFORM_DOMAIN
                  value: "open-platform.sh"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              volumeMounts:
                - name: provisioner-scripts
                  mountPath: /provisioner
                  readOnly: true
                - name: repo
                  mountPath: /repo
          volumes:
            - name: provisioner-scripts
              configMap:
                name: provisioner-scripts
                defaultMode: 0755
            - name: repo
              emptyDir: {}
---
# Health Check CronJob
# Checks instance health every 5 minutes.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: provisioner-health-check
  namespace: provisioner
  labels:
    app: provisioner
    component: health-check
    open-platform.sh/managed: "true"
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: provisioner
            component: health-check
        spec:
          serviceAccountName: provisioner
          restartPolicy: Never
          containers:
            - name: health-check
              image: alpine:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache bash curl postgresql16-client jq >/dev/null 2>&1 &&
                  exec bash /provisioner/health-check.sh
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: port
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: provisioner-db
                      key: database
                - name: PLATFORM_DOMAIN
                  value: "open-platform.sh"
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              volumeMounts:
                - name: provisioner-scripts
                  mountPath: /provisioner
                  readOnly: true
          volumes:
            - name: provisioner-scripts
              configMap:
                name: provisioner-scripts
                defaultMode: 0755
