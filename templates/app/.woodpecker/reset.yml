when:
  - event: manual

steps:
  - name: reset
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - |
        export PREVIEW_DB="pr_${CI_COMMIT_PULL_REQUEST}_${CI_REPO_NAME}"
        export PREVIEW_BUCKET="pr-${CI_COMMIT_PULL_REQUEST}-${CI_REPO_NAME}"
        export PGPASSWORD=$$(kubectl get secret -n postgres postgres-superuser -o jsonpath='{.data.password}' | base64 -d)
      - kubectl exec -i -n postgres postgres-1 -- env PGPASSWORD="$$PGPASSWORD" psql -U postgres -c "DROP DATABASE IF EXISTS $$PREVIEW_DB;"
      - kubectl exec -i -n postgres postgres-1 -- env PGPASSWORD="$$PGPASSWORD" psql -U postgres -c "CREATE DATABASE $$PREVIEW_DB OWNER $$PREVIEW_DB;"
      - |
        if [ -f schema.sql ]; then
          kubectl exec -i -n postgres postgres-1 -- env PGPASSWORD="$$PGPASSWORD" psql -U postgres -d $$PREVIEW_DB < schema.sql
        fi
      - |
        for f in $$(ls seed/sql/*.sql 2>/dev/null | sort); do
          kubectl exec -i -n postgres postgres-1 -- env PGPASSWORD="$$PGPASSWORD" psql -U postgres -d $$PREVIEW_DB < "$$f"
        done
      - |
        kubectl run minio-reset-$${CI_COMMIT_SHA:0:8} --rm -i --restart=Never \
          --image=minio/mc:latest -n minio -- sh -c \
          "mc alias set minio http://minio.minio.svc:9000 \$$(cat /minio/rootUser) \$$(cat /minio/rootPassword) && \
           mc rb --force minio/$$PREVIEW_BUCKET || true && mc mb minio/$$PREVIEW_BUCKET" \
          --overrides='{"spec":{"containers":[{"name":"mc","image":"minio/mc:latest","command":["sh","-c"],"args":["mc alias set minio http://minio.minio.svc:9000 $(cat /minio/rootUser) $(cat /minio/rootPassword) && (mc rb --force minio/pr-'${CI_COMMIT_PULL_REQUEST}'-'${CI_REPO_NAME}' || true) && mc mb minio/pr-'${CI_COMMIT_PULL_REQUEST}'-'${CI_REPO_NAME}'"],"volumeMounts":[{"name":"creds","mountPath":"/minio"}]}],"volumes":[{"name":"creds","secret":{"secretName":"minio-credentials"}}]}}'
