clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      skip_verify: true

when:
  - event: [push, manual]
    branch: main

steps:
  - name: prepare
    image: node:20-alpine
    commands:
      - sed -i "s/PROJECT_NAME/${CI_REPO_NAME}/g" package.json 2>/dev/null || true

  - name: typecheck
    image: node:20-alpine
    commands:
      - npm install
      - npm run typecheck

  - name: test
    image: oven/bun:latest
    commands:
      - bun install
      - bun test

  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      registry:
        from_secret: registry_push_host
      repo: ${CI_REPO_OWNER}/${CI_REPO_NAME}
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      skip_tls_verify: true
      cache: true
      cache_repo: ${CI_REPO_OWNER}/cache
      username:
        from_secret: registry_username
      password:
        from_secret: registry_token

  - name: provision
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - kubectl create namespace $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl label namespace $APP_NS \
          open-platform.sh/managed=true \
          open-platform.sh/org=${CI_REPO_OWNER} \
          open-platform.sh/repo=${CI_REPO_NAME} \
          open-platform.sh/tier=workload \
          open-platform.sh/environment=production \
          --overwrite
      - |
        kubectl get secret minio-credentials -n minio -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"minio"/"namespace": "'$APP_NS'"/' | \
          kubectl apply -f -
      - |
        kubectl get configmap platform-ca -n kube-system -o json | \
          sed '/"resourceVersion"/d; /"uid"/d; /"creationTimestamp"/d' | \
          sed 's/"namespace": *"kube-system"/"namespace": "'$APP_NS'"/' | \
          kubectl apply -f -
      - |
        kubectl create secret docker-registry forgejo-registry \
          --docker-server=$REGISTRY_HOST \
          --docker-username=$${REGISTRY_USER} \
          --docker-password=$${REGISTRY_TOKEN} \
          -n $APP_NS --dry-run=client -o yaml | kubectl apply -f -
      - |
        DB_SECRET_NAME="$${CI_REPO_NAME}-db"
        if ! kubectl get secret $$DB_SECRET_NAME -n $$APP_NS 2>/dev/null; then
          DB_PASS=$(head -c 24 /dev/urandom | base64 | tr -d '/+=' | head -c 24)
          kubectl create secret generic $$DB_SECRET_NAME \
            -n $$APP_NS \
            --from-literal=password="$$DB_PASS" \
            --from-literal=username="$$DB_NAME" \
            --dry-run=client -o yaml | kubectl apply -f -
        fi
        DB_PASS=$(kubectl get secret $$DB_SECRET_NAME -n $$APP_NS -o jsonpath='{.data.password}' | base64 -d)
      - |
        kubectl exec -n postgres postgres-1 -- psql -U postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1 || {
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE DATABASE $DB_NAME"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "CREATE USER $DB_NAME WITH PASSWORD '$$DB_PASS'" || true
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_NAME"
          kubectl exec -n postgres postgres-1 -- psql -U postgres -c "ALTER DATABASE $DB_NAME OWNER TO $DB_NAME"
        }
      - |
        kubectl run minio-provision-$${CI_COMMIT_SHA:0:8} --rm -i --restart=Never \
          --image=minio/mc:latest -n minio \
          --overrides='{"spec":{"containers":[{"name":"minio-provision-'$${CI_COMMIT_SHA:0:8}'","image":"minio/mc:latest","command":["sh","-c"],"args":["mc alias set minio http://minio.minio.svc:9000 $(cat /minio/rootUser) $(cat /minio/rootPassword) && mc mb --ignore-existing minio/'$APP_NS' && mc anonymous set download minio/'$APP_NS'"],"volumeMounts":[{"name":"creds","mountPath":"/minio"}]}],"volumes":[{"name":"creds","secret":{"secretName":"minio-credentials"}}]}}'
      - |
        APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
        SP=$(echo "$SERVICE_PREFIX" | tr -d ' ')
        APP_HOST="$${SP}${CI_REPO_NAME}.$PLATFORM_DOMAIN"
        AUTH_SECRET_NAME="${CI_REPO_NAME}-auth"
        if kubectl get secret $$AUTH_SECRET_NAME -n $$APP_NS 2>/dev/null; then
          echo "Auth secret exists — skipping OAuth2 app creation"
        else
          echo "Creating OAuth2 app and auth secret for ${CI_REPO_NAME}..."
          FORGEJO_USER=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.username}' | base64 -d)
          FORGEJO_PASS=$(kubectl get secret forgejo-admin-credentials -n forgejo -o jsonpath='{.data.password}' | base64 -d)
          REDIRECT_URI="https://$$APP_HOST/api/auth/oauth2/callback/forgejo"
          RESPONSE=$(curl -fsSk -u "$$FORGEJO_USER:$$FORGEJO_PASS" \
            -X POST "https://$REGISTRY_HOST/api/v1/user/applications/oauth2" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"$$APP_NS\", \"redirect_uris\": [\"$$REDIRECT_URI\"], \"confidential_client\": true}")
          CLIENT_ID=$(echo "$$RESPONSE" | grep -o '"client_id":"[^"]*"' | head -1 | cut -d'"' -f4)
          CLIENT_SECRET=$(echo "$$RESPONSE" | grep -o '"client_secret":"[^"]*"' | head -1 | cut -d'"' -f4)
          AUTH_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 32)
          FLAGS_SECRET=$(head -c 32 /dev/urandom | base64 | tr '+/' '-_' | tr -d '=')
          kubectl create secret generic $$AUTH_SECRET_NAME \
            -n $$APP_NS \
            --from-literal=client-id="$$CLIENT_ID" \
            --from-literal=client-secret="$$CLIENT_SECRET" \
            --from-literal=secret="$$AUTH_SECRET" \
            --from-literal=flags-secret="$$FLAGS_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Created OAuth2 app with redirect to $$REDIRECT_URI"
        fi
      - |
        APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
        AUTH_SECRET_NAME="${CI_REPO_NAME}-auth"
        if ! kubectl get secret $$AUTH_SECRET_NAME -n $$APP_NS -o jsonpath='{.data.flags-secret}' 2>/dev/null | grep -q .; then
          FLAGS_SECRET=$(head -c 32 /dev/urandom | base64 | tr '+/' '-_' | tr -d '=')
          kubectl patch secret $$AUTH_SECRET_NAME -n $$APP_NS \
            --type=json -p="[{\"op\":\"add\",\"path\":\"/data/flags-secret\",\"value\":\"$(echo -n $$FLAGS_SECRET | base64 | tr -d '\n')\"}]"
          echo "Added flags-secret to existing auth secret"
        fi
    environment:
      REGISTRY_USER:
        from_secret: registry_username
      REGISTRY_TOKEN:
        from_secret: registry_token
      REGISTRY_HOST:
        from_secret: registry_host
      PLATFORM_DOMAIN:
        from_secret: platform_domain
      SERVICE_PREFIX:
        from_secret: service_prefix

  - name: schema
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - |
        if [ -f schema.sql ]; then
          kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $DB_NAME < schema.sql
          kubectl exec -n postgres postgres-1 -- psql -U postgres -d $DB_NAME -c \
            "GRANT ALL ON ALL TABLES IN SCHEMA public TO $DB_NAME; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO $DB_NAME;"
        fi

  - name: seed
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - |
        SEEDED=$(kubectl exec -n postgres postgres-1 -- psql -U postgres -d $DB_NAME -tAc \
          "SELECT 1 FROM pg_tables WHERE schemaname='public' AND tablename='_seed_marker'" 2>/dev/null || echo "0")
        if [ "$SEEDED" != "1" ]; then
          SEED_FILES=$(ls seed/sql/*.sql 2>/dev/null | sort)
          if [ -n "$SEED_FILES" ]; then
            echo "First deploy — seeding production data..."
            kubectl exec -n postgres postgres-1 -- psql -U postgres -d $DB_NAME -c \
              "CREATE TABLE IF NOT EXISTS _seed_marker (seeded_at TIMESTAMPTZ DEFAULT NOW()); INSERT INTO _seed_marker DEFAULT VALUES;"
            for f in $SEED_FILES; do
              echo "  Seeding: $f"
              kubectl exec -i -n postgres postgres-1 -- psql -U postgres -d $DB_NAME < "$f"
            done
            echo "Seeding complete."
          fi
        else
          echo "Already seeded — skipping."
        fi

  - name: deploy
    image: bitnami/kubectl:latest
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-pipeline
    commands:
      - APP_NS="op-${CI_REPO_OWNER}-${CI_REPO_NAME}"
      - DB_NAME=$(echo "op_${CI_REPO_OWNER}_${CI_REPO_NAME}" | tr '-' '_')
      - SP=$(echo "$SERVICE_PREFIX" | tr -d ' ')
      - sed -i "s/SERVICE_PREFIX/$SP/g; s/APP_NAMESPACE/$APP_NS/g; s/DB_NAME/$DB_NAME/g; s/PROJECT_NAME/${CI_REPO_NAME}/g; s/ORG_NAME/${CI_REPO_OWNER}/g; s/REGISTRY_HOST/$REGISTRY_HOST/g; s/PLATFORM_DOMAIN/$PLATFORM_DOMAIN/g" k8s/*.yaml
      - sed -i "s/:latest/:${CI_COMMIT_SHA:0:8}/g" k8s/deployment.yaml
      - kubectl apply -f k8s/
      - kubectl rollout status deployment/${CI_REPO_NAME} -n $APP_NS --timeout=120s
    environment:
      SERVICE_PREFIX:
        from_secret: service_prefix
      REGISTRY_HOST:
        from_secret: registry_host
      PLATFORM_DOMAIN:
        from_secret: platform_domain

  - name: verify
    image: curlimages/curl:latest
    environment:
      SERVICE_PREFIX:
        from_secret: service_prefix
      PLATFORM_DOMAIN:
        from_secret: platform_domain
    commands:
      - |
        SP=$(echo "$SERVICE_PREFIX" | tr -d ' ')
        URL="https://$${SP}${CI_REPO_NAME}.$PLATFORM_DOMAIN/api/health"
        echo "Verifying deployment at $$URL..."
        for i in $(seq 1 30); do
          STATUS=$(curl -sk -o /dev/null -w '%{http_code}' "$$URL" 2>/dev/null || echo "000")
          if [ "$$STATUS" = "200" ]; then
            echo "Health check passed (attempt $$i)"
            exit 0
          fi
          echo "Attempt $$i: HTTP $$STATUS, retrying in 2s..."
          sleep 2
        done
        echo "Health check failed after 60s"
        exit 1
