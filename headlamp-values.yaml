config:
  oidc:
    secret:
      create: false
    externalSecret:
      enabled: true
      name: "oidc"
    issuerURL: https://forgejo.product-garden.com
    scopes: "openid,profile,email,groups"
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "headlamp-headlamp-headers@kubernetescrd"
  hosts:
    - host: headlamp.product-garden.com
      paths:
        - path: /
          type: ImplementationSpecific

env:
  - name: HEADLAMP_CONFIG_OIDC_SKIP_TLS_VERIFY
    value: "true"
