server:
  enabled: true
  env:
    WOODPECKER_FORGEJO: "true"
    WOODPECKER_FORGEJO_URL: "https://forgejo.dev.test"
    WOODPECKER_FORGEJO_SKIP_VERIFY: "true"
    WOODPECKER_CLONE_INSECURE_SKIP_VERIFY: "true"
    WOODPECKER_HOST: "https://ci.product-garden.com"
    WOODPECKER_ADMIN: "trevato"
    WOODPECKER_OPEN: "true"
  extraSecretNamesForEnvFrom:
    - woodpecker-secrets
  nodeSelector:
    kubernetes.io/hostname: otavert-vxrail
  persistentVolume:
    enabled: true
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: ci.dev.test
        paths:
          - path: /
            pathType: Prefix
      - host: ci.product-garden.com
        paths:
          - path: /
            pathType: Prefix

agent:
  enabled: true
  replicaCount: 1
  env:
    WOODPECKER_BACKEND: kubernetes
    WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
    WOODPECKER_BACKEND_K8S_VOLUME_SIZE: "5G"
    WOODPECKER_MAX_WORKFLOWS: "4"
  extraSecretNamesForEnvFrom:
    - woodpecker-secrets
